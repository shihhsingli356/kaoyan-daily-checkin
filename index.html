<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>考研每日打卡计划</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f5;
      --panel: #ffffff;
      --panel-2: #f7faf8;
      --paper: #fffdf8;
      --ink: #1f2937;
      --ink-strong: #111827;
      --muted: #667085;
      --muted-2: #98a2b3;
      --line: #d7dfdc;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #f59e0b;
      --gold: #b7791f;
      --paper-line: rgba(15, 118, 110, .075);
      --soft-green: #e9f8ef;
      --soft-blue: #eaf2ff;
      --soft-orange: #fff4df;
      --soft-red: #fff0f0;
      --shadow: 0 14px 34px rgba(31, 41, 55, .08);
      --shadow-soft: 0 6px 18px rgba(31, 41, 55, .06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #e9f3ef 0, rgba(233, 243, 239, 0) 330px),
        linear-gradient(90deg, var(--paper-line) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, var(--paper-line) 0 1px, transparent 1px 100%),
        var(--bg);
      background-size: auto, 34px 34px, 34px 34px, auto;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 245, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .wrap, main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    main { padding-bottom: 46px; }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, .9fr) minmax(620px, 1.5fr);
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(116px, 1fr));
      gap: 8px;
    }

    .stat, .panel, .calendar-card, .daily-card, .all-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      transition: box-shadow .18s ease, border-color .18s ease;
    }

    .stat {
      position: relative;
      overflow: hidden;
      min-height: 68px;
      padding: 11px 12px 10px;
      background: rgba(255, 255, 255, .86);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .stat::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      width: calc(100% - 24px);
      height: 3px;
      border-radius: 0 0 999px 999px;
      background: var(--accent);
      opacity: .86;
    }

    .stat:nth-child(3)::before { background: var(--red); }
    .stat:nth-child(4)::before { background: var(--blue); }
    .stat:nth-child(5)::before { background: var(--orange); }

    .stat:hover,
    .phase-tab:hover,
    .task:hover,
    .hour-box:hover,
    .pie-card:hover {
      box-shadow: 0 18px 42px rgba(31, 41, 55, .1);
      transform: translateY(-1px);
    }

    .stat b {
      display: block;
      font-size: 24px;
      line-height: 1.1;
      color: var(--ink-strong);
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 26px 0 11px;
    }

    .section-title h2 {
      position: relative;
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      padding-left: 12px;
    }

    .section-title h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      width: 4px;
      height: 18px;
      border-radius: 999px;
      background: var(--accent);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .phase-zone {
      margin-bottom: 16px;
    }

    .phase-zone-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 24px;
      margin-bottom: 8px;
    }

    .phase-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .phase-tab {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 13px 14px;
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .phase-tab::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 3px;
      background: transparent;
    }

    .phase-tab.active {
      border-color: var(--accent);
      background: linear-gradient(180deg, #fff 0%, #eefbf7 100%);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, .12), var(--shadow);
    }

    .phase-tab.active::after {
      background: var(--accent);
    }

    .phase-tab strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .phase-tab span {
      color: var(--muted);
      font-size: 12px;
    }

    .phase-panel {
      margin-top: 12px;
      overflow: hidden;
    }

    .phase-panel[hidden] {
      display: none;
    }

    .phase-panel details {
      overflow: hidden;
    }

    .phase-panel summary {
      list-style: none;
      cursor: pointer;
    }

    .phase-panel summary::-webkit-details-marker {
      display: none;
    }

    .phase-progress-details > summary {
      border-bottom: 0;
      background: transparent;
    }

    .phase-progress-details[open] > summary {
      border-bottom: 1px solid var(--line);
    }

    .phase-collapsed {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 18px;
    }

    .summary-ring-card {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-height: 178px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .summary-ring-card .ring {
      width: 112px;
      height: 112px;
    }

    .summary-ring-card .ring span {
      width: 76px;
      font-size: 13px;
    }

    .summary-ring-card .percent {
      margin-top: 0;
      font-size: 20px;
    }

    .expand-hint {
      color: var(--muted);
      font-size: 12px;
    }

    .phase-progress-details[open] .expand-hint {
      display: none;
    }

    .syllabus-root {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .syllabus-root > summary {
      cursor: pointer;
      font-weight: 700;
      list-style: none;
    }

    .syllabus-root > summary::-webkit-details-marker {
      display: none;
    }

    .syllabus-panel {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .syllabus-category,
    .syllabus-subject {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .syllabus-category summary,
    .syllabus-subject summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      list-style: none;
      cursor: pointer;
    }

    .syllabus-category summary::-webkit-details-marker,
    .syllabus-subject summary::-webkit-details-marker {
      display: none;
    }

    .syllabus-category summary strong,
    .syllabus-subject summary strong {
      display: block;
      font-size: 16px;
    }

    .syllabus-category summary p,
    .syllabus-subject summary p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .syllabus-category summary::after,
    .syllabus-subject summary::after {
      content: "+";
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      color: var(--accent);
      font-weight: 700;
      border: 1px solid var(--line);
    }

    .syllabus-category[open] summary::after,
    .syllabus-subject[open] summary::after {
      content: "-";
    }

    .syllabus-category-body {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .syllabus-body {
      padding: 0 18px 16px;
    }

    .syllabus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .syllabus-item {
      border: 1px solid #eef2f7;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 11px;
      background: #fbfdff;
    }

    .syllabus-item strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .syllabus-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .syllabus-item.core { border-left-color: var(--red); }
    .syllabus-item.important { border-left-color: var(--orange); }
    .syllabus-item.base { border-left-color: var(--accent); }

    .collapsible-panel {
      margin-top: 14px;
      overflow: hidden;
    }

    .collapsible-panel > summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      list-style: none;
      cursor: pointer;
    }

    .collapsible-panel > summary::-webkit-details-marker {
      display: none;
    }

    .collapsible-panel > summary::after {
      content: "+";
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--accent);
      font-weight: 800;
    }

    .collapsible-panel[open] > summary::after {
      content: "-";
    }

    .collapsible-panel > summary strong {
      display: block;
      color: var(--ink-strong);
      font-size: 17px;
    }

    .collapsible-panel > summary p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .phase-summary, .daily-head, .calendar-head, .panel-head, summary {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .phase-summary {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .phase-summary strong, .daily-head strong, .panel-head strong {
      font-size: 18px;
    }

    .phase-summary p, .daily-head p, .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 18px;
    }

    .progress-card {
      min-height: 210px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      padding: 18px;
    }

    .progress-card.detailed {
      display: grid;
      grid-template-columns: 178px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .progress-card.english-card {
      grid-column: 1 / -1;
      min-height: 150px;
    }

    .progress-ring-col {
      display: grid;
      justify-items: center;
      align-content: center;
    }

    .ring {
      --value: 0;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #fff 0 58%, transparent 59%),
        conic-gradient(var(--accent) calc(var(--value) * 1%), #e5eaf3 0);
    }

    .ring span {
      width: 86px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .percent {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }

    .sub-progress-list {
      display: grid;
      gap: 10px;
    }

    .sub-progress-item {
      border: 1px solid #eef2f7;
      border-radius: 8px;
      background: #fff;
      padding: 11px 12px;
    }

    .sub-progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .sub-progress-top strong {
      font-size: 14px;
    }

    .sub-progress-top span {
      color: var(--muted);
      white-space: nowrap;
    }

    .sub-progress-bar {
      height: 9px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
    }

    .sub-progress-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .progress-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .placeholder {
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f7;
    }

    .segmented button {
      height: 32px;
      min-width: 74px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      transition: background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .segmented button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(31, 41, 55, .08);
      font-weight: 700;
    }

    .hour-stats {
      padding: 16px;
    }

    .hour-tools {
      display: grid;
      grid-template-columns: auto minmax(160px, 1fr) auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .hour-insight-actions {
      display: inline-flex;
      justify-content: flex-start;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .record-library-toggle,
    .record-date-toggle,
    .study-distribution-toggle {
      min-height: 36px;
      border-radius: 999px;
      padding: 0 14px;
      font-weight: 800;
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .08);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, .18);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    }

    .record-date-toggle,
    .study-distribution-toggle {
      color: var(--ink);
      background: rgba(255, 253, 248, .94);
    }

    .record-library-toggle:hover,
    .record-library-toggle.active,
    .record-date-toggle:hover,
    .record-date-toggle.active,
    .study-distribution-toggle:hover,
    .study-distribution-toggle.active {
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .1);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, .34), 0 12px 26px rgba(15, 118, 110, .1);
    }

    .record-library-actions {
      position: relative;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .record-calendar-popover {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      z-index: 12;
      width: 318px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .98);
      box-shadow: 0 20px 46px rgba(8, 19, 22, .18);
      padding: 12px;
      animation: stats-panel-enter .22s ease both;
    }

    .record-calendar-head {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .record-calendar-head strong {
      text-align: center;
      font-size: 15px;
    }

    .record-calendar-head button,
    .record-calendar-day {
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }

    .record-calendar-head button {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 900;
    }

    .record-calendar-week,
    .record-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }

    .record-calendar-week {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .record-calendar-day {
      position: relative;
      min-height: 34px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .record-calendar-day.muted {
      color: var(--muted-2);
    }

    .record-calendar-day.has-record {
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .09);
    }

    .record-calendar-day.has-record::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      transform: translateX(-50%);
    }

    .record-calendar-day.active {
      border-color: rgba(15, 118, 110, .55);
      background: var(--accent);
      color: #fff;
    }

    .study-distribution-panel {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .08), rgba(255, 253, 248, .92) 38%, rgba(245, 158, 11, .07));
      padding: 14px;
      overflow: hidden;
      animation: stats-panel-enter .24s ease both;
    }

    .distribution-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .distribution-head strong {
      display: block;
      color: var(--ink-strong);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .distribution-subjects {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .distribution-subject-toggle,
    .distribution-all-toggle {
      min-height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .8);
      color: var(--muted);
      padding: 0 10px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }

    .distribution-subject-toggle.active {
      border-color: color-mix(in srgb, var(--subject-color) 42%, var(--line));
      background: color-mix(in srgb, var(--subject-color) 12%, #fff);
      color: var(--ink-strong);
    }

    .distribution-subject-toggle::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--subject-color);
      vertical-align: 1px;
      opacity: .45;
    }

    .distribution-subject-toggle.active::before {
      opacity: 1;
    }

    .distribution-subject-toggle:hover,
    .distribution-all-toggle:hover {
      transform: translateY(-1px);
      color: var(--accent-strong);
      border-color: rgba(15, 118, 110, .32);
    }

    .distribution-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .distribution-kpi {
      border: 1px solid rgba(8, 19, 22, .09);
      border-radius: 8px;
      background: rgba(255, 253, 248, .74);
      padding: 10px;
      min-width: 0;
    }

    .distribution-kpi span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .distribution-kpi b {
      display: block;
      color: var(--ink-strong);
      font-size: 18px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .distribution-grid {
      display: grid;
      grid-template-columns: minmax(300px, 1.2fr) minmax(260px, .8fr);
      gap: 10px;
    }

    .distribution-card {
      border: 1px solid rgba(8, 19, 22, .09);
      border-radius: 8px;
      background: rgba(255, 253, 248, .76);
      padding: 12px;
      min-width: 0;
    }

    .distribution-card.wide {
      grid-column: 1 / -1;
    }

    .distribution-card strong {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--ink-strong);
      font-size: 13px;
    }

    .distribution-card strong span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .rhythm-bars {
      display: grid;
      grid-template-columns: repeat(24, minmax(12px, 1fr));
      gap: 4px;
      align-items: end;
      min-height: 148px;
      padding-top: 8px;
    }

    .rhythm-bar {
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: end;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
    }

    .rhythm-bar span {
      display: block;
      min-height: 4px;
      height: var(--bar-height);
      border-radius: 999px 999px 4px 4px;
      background:
        linear-gradient(180deg, rgba(15, 118, 110, .86), rgba(15, 118, 110, .22));
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, .12);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .rhythm-bar em {
      min-height: 12px;
      font-style: normal;
    }

    .rhythm-bar:hover span {
      transform: translateY(-3px) scaleX(1.16);
      box-shadow: 0 10px 18px rgba(15, 118, 110, .18);
    }

    .heatmap-scroll {
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: 34px repeat(24, minmax(20px, 1fr));
      gap: 4px;
      min-width: 680px;
      align-items: center;
    }

    .heat-label,
    .heat-hour {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-align: center;
    }

    .heat-label {
      text-align: left;
    }

    .heat-cell {
      height: 20px;
      border-radius: 5px;
      background: rgba(15, 118, 110, var(--heat-alpha));
      box-shadow: inset 0 0 0 1px rgba(8, 19, 22, .045);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .heat-cell:hover {
      transform: scale(1.16);
      box-shadow: 0 8px 16px rgba(15, 118, 110, .16);
    }

    .period-list,
    .label-rank {
      display: grid;
      gap: 9px;
    }

    .period-row,
    .label-rank-row {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 9px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .period-track,
    .label-rank-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(8, 19, 22, .07);
      overflow: hidden;
    }

    .period-track span,
    .label-rank-track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(15, 118, 110, .72), rgba(245, 158, 11, .64));
    }

    .study-distribution-empty {
      border: 1px dashed rgba(8, 19, 22, .16);
      border-radius: 8px;
      color: var(--muted);
      padding: 18px;
      background: rgba(255, 253, 248, .58);
      font-weight: 800;
    }

    .study-record-library {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .82);
      padding: 12px;
      animation: stats-panel-enter .24s ease both;
    }

    @keyframes stats-panel-enter {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(.992);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .study-distribution-panel.closing,
    .study-record-library.closing,
    .record-calendar-popover.closing {
      pointer-events: none;
      animation: stats-panel-exit .2s ease both;
    }

    @keyframes stats-panel-exit {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(-8px) scale(.992);
      }
    }

    .study-record-focus-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      border: 1px solid rgba(15, 118, 110, .28);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, .14), rgba(245, 158, 11, .1), rgba(255, 253, 248, .72));
      color: var(--accent-strong);
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 900;
      animation: record-focus-glow .9s ease both;
    }

    .study-record-focus-banner button {
      min-height: 28px;
      border-radius: 999px;
      background: rgba(255, 253, 248, .86);
      color: var(--accent-strong);
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      padding: 0 10px;
    }

    .study-record-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .study-record-head strong {
      color: var(--ink-strong);
      font-size: 15px;
    }

    .study-record-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }

    .study-record-row {
      display: grid;
      grid-template-columns: 88px 108px minmax(170px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(8, 19, 22, .1);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      padding: 8px;
    }

    .study-record-row.focused {
      border-color: rgba(15, 118, 110, .58);
      background:
        linear-gradient(90deg, rgba(15, 118, 110, .13), rgba(255, 253, 248, .94));
      box-shadow: 0 12px 28px rgba(15, 118, 110, .14), inset 0 0 0 1px rgba(15, 118, 110, .13);
      animation: record-row-pop .8s ease both;
    }

    @keyframes record-focus-glow {
      0% {
        transform: translateY(-4px);
        opacity: 0;
        box-shadow: 0 0 0 rgba(15, 118, 110, 0);
      }
      55% {
        transform: translateY(0);
        opacity: 1;
        box-shadow: 0 16px 34px rgba(15, 118, 110, .18);
      }
      100% {
        transform: none;
        opacity: 1;
        box-shadow: 0 8px 20px rgba(15, 118, 110, .08);
      }
    }

    @keyframes record-row-pop {
      0% { transform: scale(.985); }
      55% { transform: scale(1.012); }
      100% { transform: scale(1); }
    }

    .study-record-row select,
    .study-record-row input {
      width: 100%;
      height: 34px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }

    .study-record-time {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .study-record-duration {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .study-record-save,
    .study-record-delete {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
    }

    .study-record-save {
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .1);
    }

    .study-record-delete {
      color: var(--red);
      background: rgba(220, 38, 38, .08);
    }

    .hour-panel {
      display: grid;
      grid-template-columns: minmax(280px, .95fr) minmax(280px, 1.05fr);
      gap: 14px;
      align-items: stretch;
    }

    .hour-box,
    .pie-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .hour-box strong,
    .pie-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .hour-line {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid #eef2f7;
      font-size: 13px;
    }

    .hour-line:first-of-type { border-top: 0; }

    .hour-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .hour-bar {
      height: 8px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
    }

    .hour-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .pie-layout {
      display: grid;
      grid-template-columns: 194px 170px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      min-width: 0;
    }

    .pie {
      width: 184px;
      height: 184px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 0;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, .96) 0 40%, rgba(255, 255, 255, .72) 41% 48%, transparent 49%),
        radial-gradient(circle at 42% 32%, rgba(15, 118, 110, .1), transparent 58%);
      box-shadow: inset 0 0 0 1px rgba(31, 41, 55, .08), 0 16px 36px rgba(15, 118, 110, .08);
      cursor: pointer;
      padding: 0;
      position: relative;
      overflow: hidden;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .pie:hover {
      transform: translateY(-2px) scale(1.055);
      box-shadow: inset 0 0 0 1px rgba(31, 41, 55, .1), 0 22px 42px rgba(15, 118, 110, .18);
    }

    .pie-wrap {
      position: relative;
      width: 184px;
      height: 184px;
      min-width: 0;
    }

    .pie-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: auto;
    }

    .pie-track,
    .pie-segment {
      fill: none;
    }

    .pie-track {
      stroke: #e8edf5;
      stroke-width: 18;
    }

    .pie-segment {
      stroke-width: 18;
      stroke-linecap: butt;
      filter: drop-shadow(0 4px 8px rgba(8, 19, 22, .08));
      transition: stroke-width .18s ease, filter .18s ease, opacity .18s ease;
      pointer-events: stroke;
    }

    .pie-segment:hover {
      stroke-width: 21;
      filter: drop-shadow(0 12px 18px rgba(8, 19, 22, .2));
      opacity: 1;
    }

    .pie-segment.active {
      stroke-width: 21;
      filter: drop-shadow(0 12px 20px rgba(15, 118, 110, .2));
    }

    .pie-empty {
      stroke: #e5eaf3;
      stroke-width: 18;
      fill: none;
    }

    .pie-total {
      position: relative;
      z-index: 2;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pie-total b {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.1;
    }

    .pie-legend {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .pie-subjects {
      display: grid;
      gap: 8px;
      align-content: center;
      min-width: 0;
    }

    .pie-subject-button {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .88);
      color: var(--muted);
      padding: 6px 9px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      text-align: left;
      transition: border-color .18s ease, background .18s ease, color .18s ease, transform .18s ease;
    }

    .pie-subject-button span {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      font-weight: 800;
    }

    .pie-subject-button b {
      color: var(--ink-strong);
      font-size: 12px;
      white-space: nowrap;
    }

    .pie-subject-main {
      flex: 1 1 auto;
      gap: 0;
    }

    .pie-subject-meta {
      color: var(--ink-strong);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pie-subject-button:hover,
    .pie-subject-button.active {
      border-color: color-mix(in srgb, var(--subject-color) 46%, var(--line));
      background: color-mix(in srgb, var(--subject-color) 11%, #fff);
      color: var(--accent-strong);
      transform: translateY(-1px);
    }

    .hour-breakdown-panel {
      min-height: 118px;
      height: 100%;
      min-width: 0;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .72);
      padding: 10px;
      overflow: visible;
      align-self: stretch;
    }

    .breakdown-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .breakdown-head strong {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .breakdown-total {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .breakdown-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .breakdown-item {
      display: inline-grid;
      grid-template-columns: minmax(46px, 86px) 48px 22px 22px;
      gap: 4px;
      align-items: center;
      max-width: 192px;
      border: 1px solid rgba(8, 19, 22, .11);
      border-radius: 999px;
      background: rgba(255, 253, 248, .92);
      padding: 3px 4px 3px 9px;
    }

    .breakdown-item input {
      min-width: 0;
      height: 22px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      outline: 0;
    }

    .breakdown-item input[type="number"] {
      width: 48px;
      border-left: 1px solid var(--line);
      border-radius: 0;
      text-align: right;
    }

    .breakdown-delete,
    .breakdown-confirm,
    .breakdown-add {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .84);
      color: var(--accent);
      cursor: pointer;
      font: inherit;
    }

    .breakdown-delete,
    .breakdown-confirm {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      line-height: 1;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      padding: 0;
    }

    .breakdown-confirm {
      background: rgba(15, 118, 110, .1);
      color: var(--accent-strong);
    }

    .breakdown-add {
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      font-weight: 800;
      font-size: 12px;
    }

    .breakdown-chip,
    .breakdown-other {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      background: rgba(15, 118, 110, .08);
      color: var(--accent-strong);
      padding: 0 10px;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.1;
      font-weight: 800;
    }

    .breakdown-chip {
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .breakdown-chip:hover {
      border-color: rgba(15, 118, 110, .25);
      background: rgba(15, 118, 110, .12);
      transform: translateY(-1px);
    }

    .breakdown-chip.locked {
      cursor: pointer;
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .08);
      border-color: transparent;
    }

    .breakdown-chip.locked:hover {
      border-color: rgba(15, 118, 110, .25);
      background: rgba(15, 118, 110, .12);
      transform: translateY(-1px);
    }

    .breakdown-chip small {
      margin-left: 4px;
      color: currentColor;
      font-size: 12px;
      font-weight: 800;
      opacity: .72;
    }

    .pie-popup-card {
      position: absolute;
      left: 154px;
      top: 18px;
      z-index: 5;
      width: 210px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .96);
      box-shadow: 0 18px 44px rgba(8, 19, 22, .14);
      padding: 10px;
      text-align: left;
    }

    .pie-popup-card strong {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 8px;
      font-size: 13px;
    }

    .pie-popup-card strong span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .pie-popup-list {
      display: grid;
      gap: 6px;
    }

    .pie-popup-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .pie-popup-row b {
      color: var(--ink-strong);
      font-weight: 800;
    }

    html[data-theme="dark"] .pie-subject-button,
    html[data-theme="dark"] .hour-breakdown-panel,
    html[data-theme="dark"] .breakdown-item,
    html[data-theme="dark"] .breakdown-chip,
    html[data-theme="dark"] .breakdown-add,
    html[data-theme="dark"] .breakdown-delete,
    html[data-theme="dark"] .breakdown-confirm,
    html[data-theme="dark"] .pie-popup-card,
    html[data-theme="dark"] .record-library-toggle,
    html[data-theme="dark"] .record-date-toggle,
    html[data-theme="dark"] .study-distribution-toggle,
    html[data-theme="dark"] .study-distribution-panel,
    html[data-theme="dark"] .distribution-card,
    html[data-theme="dark"] .distribution-kpi,
    html[data-theme="dark"] .distribution-subject-toggle,
    html[data-theme="dark"] .distribution-all-toggle,
    html[data-theme="dark"] .study-distribution-empty {
      border-color: rgba(255, 250, 240, .13);
      background: rgba(27, 40, 37, .96);
      color: var(--ink);
    }

    html[data-theme="dark"] .pie-subject-button:hover,
    html[data-theme="dark"] .pie-subject-button.active {
      border-color: rgba(102, 208, 191, .46);
      background: rgba(102, 208, 191, .14);
      color: var(--accent-strong);
    }

    html[data-theme="dark"] .distribution-subject-toggle.active,
    html[data-theme="dark"] .record-library-toggle:hover,
    html[data-theme="dark"] .record-library-toggle.active,
    html[data-theme="dark"] .record-date-toggle:hover,
    html[data-theme="dark"] .record-date-toggle.active,
    html[data-theme="dark"] .study-distribution-toggle:hover,
    html[data-theme="dark"] .study-distribution-toggle.active {
      border-color: rgba(102, 208, 191, .45);
      background: rgba(102, 208, 191, .14);
      color: var(--ink-strong);
    }

    html[data-theme="dark"] .pie-track,
    html[data-theme="dark"] .pie-empty {
      stroke: rgba(255, 250, 240, .18);
    }

    html[data-theme="dark"] .heat-cell {
      background: rgba(102, 208, 191, var(--heat-alpha));
      box-shadow: inset 0 0 0 1px rgba(255, 250, 240, .04);
    }

    html[data-theme="dark"] .period-track,
    html[data-theme="dark"] .label-rank-track {
      background: rgba(255, 250, 240, .12);
    }

    html[data-theme="dark"] .breakdown-item input {
      color: var(--ink-strong);
    }

    html[data-theme="dark"] .breakdown-other {
      background: rgba(241, 207, 126, .13);
      color: #f1cf7e;
    }

    html[data-theme="dark"] .pie-popup-card {
      box-shadow: 0 18px 44px rgba(0, 0, 0, .35);
    }

    @media (max-width: 980px) {
      .hour-tools {
        grid-template-columns: 1fr auto;
      }

      .hour-insight-actions {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .pie-layout {
        grid-template-columns: 184px minmax(142px, .48fr) minmax(0, 1fr);
      }

      .distribution-grid {
        grid-template-columns: 1fr;
      }

      .distribution-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .hour-tools {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .hour-insight-actions,
      .record-library-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .record-library-actions {
        flex-wrap: wrap;
      }

      .distribution-head {
        display: grid;
      }

      .distribution-subjects {
        justify-content: flex-start;
      }

      .distribution-summary {
        grid-template-columns: 1fr;
      }

      .rhythm-bars {
        grid-template-columns: repeat(24, minmax(7px, 1fr));
        gap: 2px;
      }

      .rhythm-bar {
        font-size: 9px;
      }

      .pie-layout {
        grid-template-columns: 1fr;
        justify-items: stretch;
      }

      .pie {
        justify-self: center;
      }

      .pie-wrap {
        justify-self: center;
      }

      .pie-subjects {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hour-breakdown-panel {
        height: auto;
        align-self: stretch;
      }

      .pie-popup-card {
        left: 50%;
        top: 124px;
        transform: translateX(-50%);
        width: min(230px, calc(100vw - 64px));
      }

      .study-record-row {
        grid-template-columns: 1fr;
      }

      .study-record-time {
        grid-template-columns: 1fr;
      }

      .record-library-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .record-calendar-popover {
        width: min(318px, calc(100vw - 48px));
      }
    }

    .calendar-head {
      display: grid;
      grid-template-columns: 36px 1fr 36px auto;
      align-items: center;
      gap: 10px;
    }

    .calendar-card {
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 253, 248, .94) 0%, rgba(255, 255, 255, .94) 100%),
        var(--panel);
    }

    .calendar-head strong {
      text-align: center;
      font-size: 17px;
    }

    .calendar-overview {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(4, minmax(96px, .44fr));
      gap: 10px;
      padding: 14px 16px 0;
    }

    .calendar-brief,
    .calendar-metric {
      border: 1px solid #e4ebe8;
      border-radius: 8px;
      background: rgba(255, 255, 255, .82);
      box-shadow: var(--shadow-soft);
    }

    .calendar-brief {
      padding: 12px 14px;
    }

    .calendar-brief strong,
    .calendar-metric b {
      display: block;
      color: var(--ink-strong);
      font-size: 16px;
      line-height: 1.25;
    }

    .calendar-brief p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .calendar-metric {
      display: grid;
      align-content: center;
      gap: 4px;
      min-height: 66px;
      padding: 10px 12px;
    }

    .calendar-metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-metric.done b { color: #166534; }
    .calendar-metric.late b { color: #92400e; }
    .calendar-metric.missed b { color: #991b1b; }
    .calendar-metric.open b { color: var(--accent-strong); }

    .icon-btn, .text-btn, select {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      font: inherit;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .icon-btn:hover,
    .text-btn:hover,
    select:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      transform: translateY(-1px);
    }

    .icon-btn {
      width: 36px;
      font-size: 18px;
      line-height: 1;
    }

    .text-btn, select {
      padding: 0 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      padding: 14px 16px;
    }

    .weekday, .day {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .weekday {
      min-height: 28px;
      font-weight: 700;
    }

    .day {
      position: relative;
      min-height: 58px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      align-content: center;
      gap: 5px;
      padding: 7px 4px;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .day:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      transform: translateY(-1px);
    }
    .day.out { opacity: .32; cursor: default; }

    .day.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, #f1fbf8 0%, #fff 100%);
      color: var(--ink);
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, .16), 0 10px 22px rgba(15, 118, 110, .12);
    }

    .day.today { box-shadow: inset 0 0 0 2px var(--gold); }
    .day.today.selected { box-shadow: inset 0 0 0 2px var(--gold), 0 10px 22px rgba(15, 118, 110, .12); }

    .badge {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }

    .day.done .badge {
      border: 2px solid var(--green);
      background: var(--soft-green);
      color: var(--green);
      font-weight: 700;
    }

    .day.late .badge {
      border: 2px solid var(--orange);
      background: var(--soft-orange);
      color: #9a5a00;
      font-weight: 700;
    }

    .day.missed .badge {
      border: 2px solid var(--red);
      color: var(--red);
      font-weight: 700;
    }

    .subject-marks {
      display: flex;
      justify-content: center;
      gap: 3px;
      min-height: 6px;
    }

    .subject-mark {
      width: 15px;
      height: 4px;
      border-radius: 999px;
      background: #dbe3e0;
      opacity: .95;
    }

    .subject-mark.done { background: var(--mark-color); }

    .issue-mark {
      position: absolute;
      right: 7px;
      top: 7px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #fff;
    }

    .issue-mark.open { background: var(--red); }
    .issue-mark.mastered { background: var(--green); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 5px;
      border-radius: 50%;
      vertical-align: -1px;
      background: currentColor;
    }

    .green { color: var(--green); }
    .red { color: var(--red); }
    .orange { color: var(--orange); }
    .blue { color: var(--blue); }

    .daily-card {
      margin-top: 8px;
      overflow: hidden;
      border-color: #cbd8d3;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .08), rgba(255, 255, 255, 0) 38%),
        var(--panel);
      box-shadow: 0 20px 48px rgba(17, 24, 39, .1);
    }

    .daily-card.is-done { border-color: rgba(22, 163, 74, .42); }
    .daily-card.is-late { border-color: rgba(245, 158, 11, .52); }
    .daily-card.is-missed { border-color: rgba(220, 38, 38, .42); }

    .daily-head {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, .8fr);
      gap: 18px;
      align-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, .12), transparent 38%),
        linear-gradient(180deg, #fffdf8 0%, #f7faf8 100%);
    }

    .daily-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .daily-date {
      display: block;
      margin: 0;
      color: var(--ink-strong);
      font-size: 28px;
      line-height: 1.2;
    }

    .daily-summary {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .status-pill,
    .phase-pill,
    .next-pill {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .status-pill {
      border: 1px solid rgba(15, 118, 110, .24);
      background: #ecfdf5;
      color: var(--accent-strong);
    }

    .status-pill.done {
      border-color: rgba(22, 163, 74, .32);
      background: var(--soft-green);
      color: #166534;
    }

    .status-pill.late {
      border-color: rgba(245, 158, 11, .38);
      background: var(--soft-orange);
      color: #92400e;
    }

    .status-pill.missed {
      border-color: rgba(220, 38, 38, .32);
      background: var(--soft-red);
      color: #991b1b;
    }

    .phase-pill {
      border: 1px solid #d9e2e0;
      background: #fff;
      color: var(--ink);
    }

    .next-pill {
      margin-top: 12px;
      border: 1px solid rgba(37, 99, 235, .18);
      background: var(--soft-blue);
      color: #1d4ed8;
    }

    .daily-meter {
      border: 1px solid rgba(15, 118, 110, .16);
      border-radius: 8px;
      background: rgba(255, 255, 255, .78);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .daily-meter-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .daily-meter-top strong {
      color: var(--ink-strong);
      font-size: 30px;
      line-height: 1;
    }

    .daily-meter-top span {
      color: var(--muted);
      font-size: 12px;
    }

    .daily-progress-track {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8eeeb;
    }

    .daily-progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width .22s ease;
    }

    .daily-hours {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .daily-hours span {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .daily-hours b {
      color: var(--ink-strong);
      font-size: 18px;
    }

    .daily-card .daily-head strong,
    .daily-card .daily-head p {
      margin: 0;
    }

    .reminder {
      margin: 16px 20px 0;
      border: 1px solid #ecd49d;
      border-radius: 8px;
      padding: 12px 14px;
      background: #fffaf0;
      color: #7a4b00;
      font-size: 14px;
      line-height: 1.6;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px 20px;
    }

    .task {
      position: relative;
      overflow: hidden;
      min-height: 188px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, .92);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .task::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
    }

    .task.subject-cs::before { background: var(--accent); }
    .task.subject-math::before { background: var(--blue); }
    .task.subject-english::before { background: var(--orange); }
    .task.subject-politics::before { background: var(--red); }

    .task.subject-cs:hover { border-color: rgba(15, 118, 110, .35); }
    .task.subject-math:hover { border-color: rgba(37, 99, 235, .35); }
    .task.subject-english:hover { border-color: rgba(245, 158, 11, .42); }
    .task.subject-politics:hover { border-color: rgba(220, 38, 38, .35); }

    .task.is-done {
      border-color: rgba(22, 163, 74, .34);
      background: linear-gradient(180deg, #f3fbf6 0%, #fff 92%);
    }

    .task.is-done::after {
      content: "已完成";
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: rgba(22, 101, 52, .14);
      font-size: 24px;
      font-weight: 800;
      pointer-events: none;
    }

    .task.completion-flash {
      animation: task-completion-flash .86s ease both;
    }

    .daily-card.date-focus-highlight {
      animation: daily-date-focus .9s ease both;
    }

    @keyframes task-completion-flash {
      0% {
        box-shadow: var(--shadow-soft);
        transform: translateY(0);
      }
      34% {
        border-color: rgba(241, 207, 126, .86);
        box-shadow: 0 0 0 4px rgba(241, 207, 126, .16), 0 16px 36px rgba(15, 118, 110, .12);
        transform: translateY(-2px);
      }
      100% {
        box-shadow: var(--shadow-soft);
        transform: translateY(0);
      }
    }

    @keyframes daily-date-focus {
      0% {
        box-shadow: var(--shadow);
      }
      35% {
        border-color: rgba(15, 118, 110, .54);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, .12), var(--shadow);
      }
      100% {
        box-shadow: var(--shadow);
      }
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .task label.check-label {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.6;
    }

    .task input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin: 0;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .task-copy {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .task-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
    }

    .task-state {
      flex: 0 0 auto;
      border-radius: 999px;
      background: #f1f5f9;
      padding: 3px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .task.is-done .task-state {
      background: var(--soft-green);
      color: #166534;
    }

    .hours-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eef2f7;
      color: var(--muted);
      font-size: 13px;
    }

    .hours-entry {
      display: grid;
      grid-template-columns: minmax(74px, 96px) minmax(86px, 120px) 34px;
      gap: 6px;
      align-items: center;
      justify-content: end;
    }

    .hours-entry select {
      height: 34px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 8px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
    }

    .hours-confirm {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--accent-strong);
      background: rgba(15, 118, 110, .1);
    }

    input[type="number"] {
      width: 86px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 8px;
      font: inherit;
      text-align: right;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .review {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 20px 20px;
    }

    .review-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
    }

    .review-block label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .issue-entry-block {
      grid-column: 1 / -1;
    }

    .fix-block {
      grid-column: 1 / -1;
    }

    .subject-issue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .subject-issue {
      border: 1px solid #eef2f7;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 10px;
      background: #fbfdff;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .subject-issue.subject-cs { border-left-color: var(--accent); }
    .subject-issue.subject-math { border-left-color: var(--blue); }
    .subject-issue.subject-english { border-left-color: var(--orange); }
    .subject-issue.subject-politics { border-left-color: var(--red); }

    .subject-issue:focus-within {
      border-color: rgba(15, 118, 110, .35);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .08);
    }

    .subject-issue label {
      margin-bottom: 7px;
      color: var(--ink);
    }

    .subject-issue textarea {
      min-height: 104px;
    }

    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      line-height: 1.5;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    textarea:focus,
    input[type="number"]:focus {
      outline: 0;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .1);
    }

    .issues-list {
      padding: 12px 16px 16px;
    }

    .issue-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
    }

    .issue-tabs.compact {
      padding: 0;
      margin-bottom: 10px;
    }

    .issue-tabs.sub {
      padding-top: 8px;
    }

    .subject-tab {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 0 14px;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      transition: border-color .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .subject-tab:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
    }

    .subject-tab.active {
      border-color: var(--accent);
      background: #eefbf7;
      color: var(--accent);
      font-weight: 700;
    }

    .issue-tabs.sub .subject-tab {
      height: 30px;
      font-size: 13px;
      background: rgba(248, 250, 247, .78);
    }

    .issue-picker .subject-issue {
      margin-top: 4px;
    }

    .issue-list-head,
    .issue-item {
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
    }

    .issue-list-head {
      padding: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }

    .issue-item {
      padding: 12px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.6;
      border-radius: 8px;
    }

    .issue-item:first-child { border-top: 0; }

    .issue-item:hover {
      background: #fbfdff;
    }

    .issue-date {
      width: 156px;
      height: auto;
      min-height: 36px;
      padding: 6px 8px;
      white-space: nowrap;
      line-height: 1.35;
      font-weight: 700;
      color: var(--blue);
    }

    .issue-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .confirm-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .confirm-grid label {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 6px;
      align-items: start;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      padding: 6px;
      border: 1px solid #eef2f7;
      border-radius: 7px;
      background: #fff;
    }

    .confirm-grid input {
      width: 16px;
      height: 16px;
      margin: 1px 0 0;
      accent-color: var(--accent);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      background: #fbfdff;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    details.all-card {
      margin-top: 14px;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    .all-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .phase-table-title {
      flex: 1 1 280px;
      font-weight: 700;
    }

    .table-shell { overflow: auto; }

    table {
      width: 100%;
      min-width: 880px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
      line-height: 1.45;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef2f7;
      color: #344054;
    }

    tbody tr:hover {
      background: #fbfdff;
    }

    .mini-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 12px;
    }

    .status-circle {
      width: 19px;
      height: 19px;
      display: inline-block;
      border-radius: 50%;
      border: 2px solid #111827;
      vertical-align: middle;
      box-shadow: inset 0 0 0 2px #fff;
    }

    .status-circle.done { background: #111827; }
    .status-circle.off { border-color: #cbd5e1; background: #f8fafc; }

    .floating-today {
      position: fixed;
      right: 18px;
      top: 50%;
      z-index: 30;
      display: grid;
      gap: 8px;
    }

    .floating-today .text-btn {
      box-shadow: var(--shadow);
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    @media (max-width: 980px) {
      .topbar,
      .daily-head,
      .progress-grid,
      .progress-card.detailed,
      .task-grid,
      .review,
      .hour-panel,
      .subject-issue-grid {
        grid-template-columns: 1fr;
      }

      .stats { grid-template-columns: repeat(2, 1fr); }
      .phase-tabs { grid-template-columns: 1fr; }
      .phase-collapsed { grid-template-columns: 1fr; }
      .phase-summary { display: block; }
      .calendar-head { grid-template-columns: 36px 1fr 36px; }
      .calendar-head .text-btn { grid-column: 1 / -1; }
      .calendar-overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .calendar-brief { grid-column: 1 / -1; }
      .issue-list-head,
      .issue-item { grid-template-columns: 1fr; }
      .floating-today { right: 10px; bottom: 12px; top: auto; }
    }

    @media (max-width: 640px) {
      .wrap, main {
        padding-left: 12px;
        padding-right: 12px;
      }

      h1 { font-size: 22px; }
      .sub { font-size: 13px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stat { min-height: 62px; }

    .cloud-sync {
      margin-bottom: 16px;
      overflow: hidden;
    }

    .cloud-sync > summary {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      padding: 0 18px;
      cursor: pointer;
      list-style: none;
    }

    .cloud-sync > summary::-webkit-details-marker {
      display: none;
    }

    .cloud-title {
      color: var(--ink-strong);
      font-weight: 900;
      font-size: 18px;
    }

    .cloud-summary {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cloud-chevron {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(9, 24, 27, .12);
      background: rgba(255, 255, 255, .52);
      color: var(--accent);
      transition: transform .18s ease, background .18s ease;
    }

    .cloud-sync[open] .cloud-chevron {
      transform: rotate(180deg);
    }

    .cloud-body {
      border-top: 1px solid var(--line);
      padding: 16px 18px 18px;
    }

    .cloud-status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(9, 24, 27, .1);
      background: rgba(255, 253, 248, .58);
    }

    .cloud-status strong {
      color: var(--ink-strong);
    }

    .cloud-status span {
      color: var(--muted);
      font-size: 13px;
    }

    .cloud-status.ok {
      border-color: rgba(15, 118, 110, .26);
      background: rgba(15, 118, 110, .08);
    }

    .cloud-status.warn {
      border-color: rgba(189, 143, 46, .32);
      background: rgba(189, 143, 46, .12);
    }

    .cloud-status.error {
      border-color: rgba(220, 38, 38, .28);
      background: rgba(220, 38, 38, .08);
    }

    .cloud-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cloud-auth {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) auto auto auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .cloud-field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .cloud-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(9, 24, 27, .12);
      border-radius: 8px;
      background: rgba(255, 253, 248, .86);
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
      outline: none;
    }

    .cloud-input:focus {
      border-color: rgba(15, 118, 110, .52);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .12);
    }

    .cloud-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .cloud-button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .cloud-primary,
    .cloud-ghost {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .cloud-primary {
      border: 1px solid rgba(15, 118, 110, .38);
      background: var(--accent);
      color: #fffdf7;
    }

    .cloud-ghost {
      border: 1px solid rgba(9, 24, 27, .12);
      background: rgba(255, 253, 248, .72);
      color: var(--ink-strong);
    }

    .cloud-primary:disabled,
    .cloud-ghost:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .cloud-auto {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);

<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>考研每日打卡计划</h1>
          <div class="sub">正式规划从 2026-07-04 开始，到 2026-12-18 结束；2026-12-19 考试。</div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">深色模式</button>
        </div>
        <div class="stats" aria-label="统计区">
          <div class="stat"><b id="overallRate">0%</b><span>总完成率</span></div>
          <div class="stat"><b id="doneDays">0</b><span>已完成天数</span></div>
          <div class="stat"><b id="missedDays">0</b><span>未完成天数</span></div>
          <div class="stat"><b id="daysLeft">-</b><span>距离考试天数</span></div>
          <div class="stat"><b id="totalDays">0</b><span>总规划天数</span></div>
        </div>
      </div>
    </div>
  </header>

  <div class="mobile-mini-bar" id="mobileMiniBar" aria-hidden="true">
    <div class="mobile-mini-main">
      <strong>考研打卡</strong>
      <span id="mobileMiniMeta">今日 0/0 · 总完成 0%</span>
    </div>
    <b class="mobile-mini-days" id="mobileMiniDays">距考试 - 天</b>
  </div>

  <div class="floating-today">
    <button class="text-btn" id="floatToday">回到今天</button>
    <button class="text-btn" id="floatAllTable">全部表</button>
    <button class="text-btn" id="floatTimer">计时器</button>
  </div>

  <aside class="study-timer-panel" id="studyTimerPanel" aria-hidden="true" aria-label="学习计时器">
    <div class="study-timer-head">
      <strong>学习计时器</strong>
      <button class="study-timer-hide" id="studyTimerHide" type="button" title="隐藏">×</button>
    </div>
    <div class="study-timer-body">
      <div class="study-timer-time" id="studyTimerDisplay">00:00:00</div>

        </label>

          标签

        </label>
      </div>
      <div class="study-timer-actions">

        <button id="studyTimerPause" type="button">暂停</button>
        <button id="studyTimerReset" type="button">清零</button>
      </div>
      <div class="study-history">
        <div class="study-history-title">最近记录</div>
        <div id="studyTimerHistory"></div>
      </div>
    </div>

      </div>

      <section class="phase-panel panel" id="phasePanel"></section>

        <span class="cloud-chevron">⌄</span>
      </summary>
      <div class="cloud-body" id="cloudPanel"></div>
    </details>

    <section class="daily-card" id="dailyCard"></section>

    <section class="section-title">
      <h2>月历复盘</h2>
      <span class="hint">点日期可切换当天任务；小红圈表示有未掌握问题，小绿圈表示问题已掌握。</span>
    </section>
    <section class="calendar-card">

        <strong id="monthTitle">-</strong>

      <div class="calendar-grid" id="calendarGrid"></div>

          <span><i class="dot orange"></i>补完成</span>

          <span><i class="dot red"></i>有未掌握问题</span>
        </div>
      </div>
    </section>

    <details class="panel collapsible-panel">

          <strong>学习时长统计</strong>

        items.forEach(item => {
